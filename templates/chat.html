{% extends "base.html" %}
{% block content %}

<div class="layout">

<div id="sidebar" class="history">
  <h3>Chats</h3>
  <div class="history-item">YouTube Session</div>
</div>

<div class="chat">
  <div id="chatBox" class="chat-box"></div>

  <form class="input" onsubmit="return false;">
    <textarea id="messageInput" rows="1"
    placeholder="Ask about this video..."></textarea>
    <button type="button" onclick="sendMessage()">Send</button>
  </form>
</div>

<div class="context">
  <iframe id="player"></iframe>
  <p>{{ video_url }}</p>
</div>

</div>

<script>
window.vectorTubeVideoUrl = "{{ video_url }}";
const video = window.vectorTubeVideoUrl;

function getID(url){
 const matchFromQuery = url.match(/[?&]v=([^&]+)/);
 if (matchFromQuery) return matchFromQuery[1];

 const matchFromPath = url.match(/(?:youtu\.be\/|shorts\/|embed\/|live\/)([^?&/]+)/);
 return matchFromPath ? matchFromPath[1] : "";
}

const id=getID(video);
document.getElementById("player").src=
`https://www.youtube.com/embed/${id}`;
</script>

{% endblock %}
